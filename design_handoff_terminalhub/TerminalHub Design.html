<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TerminalHub — Mobile Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #141414; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="screens-a.jsx"></script>
  <script type="text/babel" src="screens-b.jsx"></script>

  <script type="text/babel">
    const dirA = [
      { id: 'a-login',     label: 'Login / Setup',   C: ALogin     },
      { id: 'a-devices',   label: 'Device List',      C: ADevices   },
      { id: 'a-terminal',  label: '★ Terminal',       C: ATerminal  },
      { id: 'a-claude',    label: 'Claude Chat',      C: AClaude    },
      { id: 'a-favorites', label: 'Favorites',        C: AFavorites },
      { id: 'a-settings',  label: 'Settings',         C: ASettings  },
    ];

    const dirB = [
      { id: 'b-login',     label: 'Login / Setup',   C: BLogin     },
      { id: 'b-devices',   label: 'Device List',      C: BDevices   },
      { id: 'b-terminal',  label: '★ Terminal',       C: BTerminal  },
      { id: 'b-claude',    label: 'Claude Chat',      C: BClaude    },
      { id: 'b-favorites', label: 'Favorites',        C: BFavorites },
      { id: 'b-settings',  label: 'Settings',         C: BSettings  },
    ];

    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="dir-a"
            title="Direction A — Raw Signal"
            subtitle="Amber on black · Dense, sysadmin-first · Pure terminal aesthetic"
          >
            {dirA.map(({ id, label, C }) => (
              <DCArtboard key={id} id={id} label={label} width={402} height={874}>
                <IOSDevice dark={true}>
                  <C />
                </IOSDevice>
              </DCArtboard>
            ))}
          </DCSection>

          <DCSection
            id="dir-b"
            title="Direction B — Pulse"
            subtitle="Deep navy · Amber glow · Glass panels · Spatial &amp; dimensional"
          >
            {dirB.map(({ id, label, C }) => (
              <DCArtboard key={id} id={id} label={label} width={402} height={874}>
                <IOSDevice dark={true}>
                  <C />
                </IOSDevice>
              </DCArtboard>
            ))}
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
